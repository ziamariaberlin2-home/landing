<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Explore the Zia Maria menu: Roman-style pizza, pasta, salads, drinks, and desserts in Friedrichshain, Berlin.">
    <title>Menu | Zia Maria Berlin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="./assets/css/shared.css">
    <style>
        .menu-hero { background: var(--red); color: var(--white); padding: 84px 0 70px; text-align: center; }
        .menu-hero h1 { font-size: clamp(42px, 7vw, 68px); line-height: 1.1; margin-bottom: 14px; }
        .menu-hero p { font-size: 18px; opacity: .92; }
        .menu-page { padding: 46px 0 80px; }
        .category-filter { display: flex; gap: 10px; overflow-x: auto; padding: 4px 0 20px; margin-bottom: 20px; scrollbar-width: thin; }
        .filter-pill { flex: 0 0 auto; padding: 10px 16px; border: 1px solid var(--border); border-radius: 999px; background: var(--white); color: var(--text-mid); cursor: pointer; font: 600 14px Inter, sans-serif; transition: .2s; }
        .filter-pill:hover, .filter-pill.active { background: var(--red); color: var(--white); border-color: var(--red); }
        .menu-section { padding: 28px 0 42px; scroll-margin-top: 90px; }
        .section-title { font-size: clamp(30px, 4vw, 40px); color: var(--red); margin-bottom: 24px; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(245px, 1fr)); gap: 24px; }
        .menu-card { display: flex; flex-direction: column; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
        .card-image { position: relative; height: 180px; background: var(--light-gray); }
        .card-image img { width: 100%; height: 100%; object-fit: cover; }
        .category-badge { position: absolute; left: 12px; bottom: 12px; background: rgba(26,26,26,.78); color: #fff; border-radius: 999px; padding: 5px 9px; font-size: 11px; font-weight: 600; }
        .card-content { display: flex; flex: 1; flex-direction: column; padding: 18px; }
        .card-content h3 { font-size: 21px; line-height: 1.2; margin-bottom: 9px; }
        .description { color: var(--text-mid); font-size: 14px; line-height: 1.5; }
        .card-footer { margin-top: auto; padding-top: 16px; }
        .price { color: var(--red); font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; }
    </style>
</head>
<body>
    <main>
        <section class="menu-hero">
            <div class="container">
                <h1 class="serif italic">Our Menu</h1>
                <p>Pizza, pasta, salads, and a few things worth lingering over.</p>
            </div>
        </section>
        <section class="menu-page">
            <div class="container">
                <div id="categoryFilter" class="category-filter" aria-label="Menu categories"></div>
                <div id="menuGrid" aria-live="polite"></div>
            </div>
        </section>
    </main>
    <script src="./assets/js/components.js"></script>
    <script src="./assets/js/menu.js"></script>
</body>
</html>
