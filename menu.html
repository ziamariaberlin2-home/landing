<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Menu | Zia Maria – Friedrichshain, Berlin</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./assets/css/shared.css">
    
    <style>
        .page-hero {
            background-color: var(--red);
            color: var(--white);
            padding: 60px 0;
            text-align: center;
        }
        
        .page-hero h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        .page-hero p {
            font-size: 18px;
            opacity: 0.9;
        }
        
        /* Category Filter Bar */
        .filter-bar-wrapper {
            position: sticky;
            top: 80px; /* Header height */
            background: var(--white);
            z-index: 900;
            border-bottom: 1px solid var(--border);
            padding: 15px 0;
        }
        
        .filter-bar {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: none; /* Firefox */
        }
        
        .filter-bar::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }
        
        .filter-pill {
            white-space: nowrap;
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid var(--border);
            background: var(--white);
            color: var(--text-dark);
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .filter-pill.active {
            background-color: var(--red);
            color: var(--white);
            border-color: var(--red);
        }
        
        /* Menu Layout */
        .menu-section {
            margin-bottom: 60px;
        }
        
        .section-title {
            font-size: 32px;
            margin-bottom: 30px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--light-gray);
        }
        
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }
        
        .menu-card {
            background: var(--white);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: 0.3s;
            display: flex;
            flex-direction: column;
        }
        
        .menu-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }
        
        .card-image {
            position: relative;
            height: 180px;
        }
        
        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .category-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(255,255,255,0.9);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: var(--red);
        }
        
        .card-content {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        
        .card-content h3 {
            font-size: 20px;
            margin-bottom: 10px;
        }
        
        .card-content .description {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 20px;
            flex-grow: 1;
        }
        
        .card-footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }
        
        .card-footer .price {
            color: var(--red);
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 18px;
        }
        
        @media (max-width: 1024px) {
            .menu-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 640px) {
            .menu-grid {
                display: flex;
                overflow-x: auto;
                gap: 20px;
                padding-bottom: 20px;
                scrollbar-width: thin;
            }
            
            .menu-card {
                min-width: 280px;
            }
            
            .section-title {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <main>
        <!-- Page Hero -->
        <section class="page-hero">
            <div class="container">
                <h1 class="serif italic">Our Menu</h1>
                <p>Everything made fresh, every day.</p>
            </div>
        </section>

        <!-- Category Filter -->
        <div class="filter-bar-wrapper">
            <div class="container">
                <div class="filter-bar" id="categoryFilter">
                    <!-- Pills injected via JS -->
                </div>
            </div>
        </div>

        <!-- Menu Content -->
        <section class="menu-content" id="menuContent">
            <div class="container" id="menuGrid">
                <!-- Menu sections injected via JS -->
            </div>
        </section>
    </main>

    <!-- Shared Components -->
    <script src="./assets/js/components.js"></script>
    <!-- Page Logic -->
    <script src="./assets/js/menu.js"></script>
</body>
</html>
