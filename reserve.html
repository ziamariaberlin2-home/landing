<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserve a Table | Zia Maria – Friedrichshain, Berlin</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- EmailJS -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./assets/css/shared.css">
    
    <style>
        .page-hero {
            background-color: var(--red);
            color: var(--white);
            padding: 60px 0;
            text-align: center;
        }
        
        .page-hero h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        .page-hero p {
            font-size: 18px;
            opacity: 0.9;
        }
        
        .form-container {
            max-width: 560px;
            margin: -40px auto 80px;
            background: var(--white);
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            position: relative;
            z-index: 10;
        }
        
        .form-note {
            text-align: center;
            margin-top: 20px;
            color: var(--text-muted);
            font-size: 14px;
        }
        
        .btn-full {
            width: 100%;
            margin-top: 10px;
        }
        
        @media (max-width: 640px) {
            .form-container {
                margin: 20px;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <main>
        <!-- Page Hero -->
        <section class="page-hero">
            <div class="container">
                <h1 class="serif italic">Reserve a Table</h1>
                <p>Book your spot in Friedrichshain</p>
            </div>
        </section>

        <!-- Reservation Form -->
        <section class="form-section">
            <div class="container">
                <div class="form-container">
                    <div id="statusMessage" style="display: none;"></div>
                    <form id="reservationForm">
                        <div class="form-group">
                            <label for="fullName">Full Name *</label>
                            <input type="text" id="fullName" name="fullName" required placeholder="John Doe">
                            <span class="error-message">This field is required</span>
                        </div>
                        
                        <div class="form-group">
                            <label for="phone">Phone *</label>
                            <input type="tel" id="phone" name="phone" required placeholder="0176 0000 0000">
                            <span class="error-message">This field is required</span>
                        </div>
                        
                        <div class="form-group">
                            <label for="email">Email *</label>
                            <input type="email" id="email" name="email" required placeholder="john@example.com">
                            <span class="error-message">This field is required</span>
                        </div>
                        
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                            <div class="form-group">
                                <label for="date">Date *</label>
                                <input type="date" id="date" name="date" required>
                                <span class="error-message">Required</span>
                            </div>
                            <div class="form-group">
                                <label for="time">Time *</label>
                                <select id="time" name="time" required>
                                    <option value="">Select Time</option>
                                    <option value="12:00">12:00</option>
                                    <option value="12:30">12:30</option>
                                    <option value="13:00">13:00</option>
                                    <option value="13:30">13:30</option>
                                    <option value="14:00">14:00</option>
                                    <option value="14:30">14:30</option>
                                    <option value="18:00">18:00</option>
                                    <option value="18:30">18:30</option>
                                    <option value="19:00">19:00</option>
                                    <option value="19:30">19:30</option>
                                    <option value="20:00">20:00</option>
                                    <option value="20:30">20:30</option>
                                    <option value="21:00">21:00</option>
                                    <option value="21:30">21:30</option>
                                </select>
                                <span class="error-message">Required</span>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="guests">Number of Guests *</label>
                            <select id="guests" name="guests" required>
                                <option value="1">1 Person</option>
                                <option value="2" selected>2 People</option>
                                <option value="3">3 People</option>
                                <option value="4">4 People</option>
                                <option value="5">5 People</option>
                                <option value="6">6 People</option>
                                <option value="7">7 People</option>
                                <option value="8+">8+ People</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="notes">Special Requests</label>
                            <textarea id="notes" name="notes" rows="3" placeholder="Allergies, birthday, etc."></textarea>
                        </div>
                        
                        <button type="submit" class="btn btn-primary btn-full">Confirm Reservation</button>
                    </form>
                    <p class="form-note">We'll confirm your booking via email or phone within a few hours.</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Shared Components -->
    <script src="./assets/js/components.js"></script>
    <!-- Form Logic -->
    <script src="./assets/js/forms.js"></script>
    <script>
        // Set min date to today
        document.getElementById('date').min = new Date().toISOString().split('T')[0];
    </script>
</body>
</html>
